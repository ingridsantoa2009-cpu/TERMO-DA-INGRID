<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meu Termo</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#121213;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:30px;
}

.tile{
width:60px;
height:60px;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
text-transform:uppercase;
}

.correct{
background:#6aaa64;
border:none;
}

.present{
background:#c9b458;
border:none;
}

.absent{
background:#3a3a3c;
border:none;
}

#keyboard{
margin-top:30px;
}

.keyrow{
display:flex;
justify-content:center;
margin-bottom:8px;
}

.key{
background:white;
color:black;
border:none;
margin:2px;
padding:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
border-radius:4px;
}

.key.enter{
background:#6aaa64;
color:white;
}

.key.delete{
background:#6aaa64;
color:white;
}

#message{
margin-top:20px;
font-size:22px;
}

button{
font-size:16px;
padding:10px 20px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Meu Termo</h1>

<div id="board"></div>

<div id="keyboard">

<div class="keyrow">
<button class="key" onclick="press('Q')">Q</button>
<button class="key" onclick="press('W')">W</button>
<button class="key" onclick="press('E')">E</button>
<button class="key" onclick="press('R')">R</button>
<button class="key" onclick="press('T')">T</button>
<button class="key" onclick="press('Y')">Y</button>
<button class="key" onclick="press('U')">U</button>
<button class="key" onclick="press('I')">I</button>
<button class="key" onclick="press('O')">O</button>
<button class="key" onclick="press('P')">P</button>
</div>

<div class="keyrow">
<button class="key" onclick="press('A')">A</button>
<button class="key" onclick="press('S')">S</button>
<button class="key" onclick="press('D')">D</button>
<button class="key" onclick="press('F')">F</button>
<button class="key" onclick="press('G')">G</button>
<button class="key" onclick="press('H')">H</button>
<button class="key" onclick="press('J')">J</button>
<button class="key" onclick="press('K')">K</button>
<button class="key" onclick="press('L')">L</button>
</div>

<div class="keyrow">
<button class="key enter" onclick="check()">ENTER</button>
<button class="key" onclick="press('Z')">Z</button>
<button class="key" onclick="press('X')">X</button>
<button class="key" onclick="press('C')">C</button>
<button class="key" onclick="press('V')">V</button>
<button class="key" onclick="press('B')">B</button>
<button class="key" onclick="press('N')">N</button>
<button class="key" onclick="press('M')">M</button>
<button class="key delete" onclick="del()">⌫</button>
</div>

</div>

<div id="message"></div>

<button onclick="restart()">Tentar de novo</button>

<script>

let palavra="AMORZ"
let tentativaAtual=0
let maxTentativas=6
let tentativa=""

const board=document.getElementById("board")

for(let i=0;i<30;i++){
let tile=document.createElement("div")
tile.classList.add("tile")
board.appendChild(tile)
}

function press(letra){

if(tentativa.length<5){
tentativa+=letra
updateBoard()
}

}

function del(){

tentativa=tentativa.slice(0,-1)
updateBoard()

}

function updateBoard(){

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

tile.textContent=tentativa[i]||""

}

}

function check(){

if(tentativa.length!=5){
alert("Digite 5 letras")
return
}

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

if(tentativa[i]==palavra[i]){
tile.classList.add("correct")
}

else if(palavra.includes(tentativa[i])){
tile.classList.add("present")
}

else{
tile.classList.add("absent")
}

}

if(tentativa==palavra){
document.getElementById("message").innerHTML="🎉 Você acertou!"
return
}

tentativaAtual++
tentativa=""

if(tentativaAtual==maxTentativas){
document.getElementById("message").innerHTML="❌ Você perdeu! A palavra era "+palavra
}

}

function restart(){
location.reload()
}

</script>

</body>
</html>
